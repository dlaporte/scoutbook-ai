# Override file — automatically loaded by docker compose.
# For platform deploys (Coolify, etc.), delete this file;
# the platform handles port exposure and TLS.

# === Local Development (default) ===
# Exposes services directly on host ports. No TLS.
services:
  app:
    ports:
      - "${APP_PORT:-8000}:8000"

  mcp:
    ports:
      - "${MCP_PORT:-8001}:8000"

